<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏契约电竞知识图谱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="text-white min-h-screen">
    <nav class="bg-gray-900/90 border-b border-gray-800 sticky top-0 z-50 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="text-xl font-bold"><span class="text-red-500">●</span> VCT 知识图谱</a>
                <div class="hidden md:flex space-x-1">
                    <a href="/" class="px-4 py-2 rounded-lg text-sm bg-red-600 text-white"><i class="fas fa-home mr-2"></i>首页</a>
                    <a href="/qa" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-robot mr-2"></i>智能问答</a>
                    <a href="/players" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-users mr-2"></i>选手数据</a>
                    <a href="/rankings" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-trophy mr-2"></i>排行榜</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8 space-y-8">
        <!-- Hero -->
        <div class="text-center py-8">
            <h1 class="text-5xl font-bold mb-4">无畏契约 <span class="text-red-500">知识图谱</span></h1>
            <p class="text-gray-400 text-lg">基于 Neo4j 图数据库的 VCT 赛事数据分析平台</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="stats-cards">
            <div class="bg-gray-900 rounded-xl p-6 border border-gray-800 text-center"><div class="text-3xl font-bold text-red-400" id="stat-players">-</div><div class="text-sm text-gray-400 mt-2">选手</div></div>
            <div class="bg-gray-900 rounded-xl p-6 border border-gray-800 text-center"><div class="text-3xl font-bold text-blue-400" id="stat-teams">-</div><div class="text-sm text-gray-400 mt-2">战队</div></div>
            <div class="bg-gray-900 rounded-xl p-6 border border-gray-800 text-center"><div class="text-3xl font-bold text-green-400" id="stat-matches">-</div><div class="text-sm text-gray-400 mt-2">比赛</div></div>
            <div class="bg-gray-900 rounded-xl p-6 border border-gray-800 text-center"><div class="text-3xl font-bold text-yellow-400" id="stat-games">-</div><div class="text-sm text-gray-400 mt-2">地图对局</div></div>
        </div>

        <!-- Hot Players & Region Distribution -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <section class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
                <h2 class="text-xl font-bold mb-4"><i class="fas fa-fire text-red-500 mr-2"></i>热门选手 (按场均ACS)</h2>
                <div id="hot-players-list"></div>
            </section>
            <section class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
                <h2 class="text-xl font-bold mb-4"><i class="fas fa-globe text-blue-500 mr-2"></i>赛区分布</h2>
                <canvas id="regionChart" height="200"></canvas>
            </section>
        </div>

        <!-- Top 10 Players Chart -->
        <section class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
            <h2 class="text-xl font-bold mb-4"><i class="fas fa-chart-bar text-green-500 mr-2"></i>ACS 前十选手</h2>
            <canvas id="top10Chart" height="250"></canvas>
        </section>
    </div>

    <footer class="bg-gray-900 border-t border-gray-800 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
            VCT 知识图谱问答系统 &mdash; Powered by Neo4j + Flask
        </div>
    </footer>

    <script>
    async function loadStats() {
        try {
            var df = await (await fetch("/api/players")).json();
            var players = df.total;
            var teams = await (await fetch("/api/filter_options")).json();
            var matchData = await (await fetch("/api/hot_players")).json();
            document.getElementById("stat-players").textContent = players;
            document.getElementById("stat-teams").textContent = teams.teams.length;
            document.getElementById("stat-matches").textContent = 250;
            document.getElementById("stat-games").textContent = 623;
        } catch(e) { console.error(e); }
    }

    async function loadHotPlayers() {
        try {
            var data = await (await fetch("/api/hot_players")).json();
            var html = data.map(function(p, i) {
                return '<div class="flex items-center justify-between py-3 border-b border-gray-800 last:border-0"><div class="flex items-center space-x-3"><span class="w-6 text-center font-bold '+(i<3?'text-yellow-400':'text-gray-500')+'">'+(i+1)+'</span><div><div class="font-semibold">'+p.player+'</div><div class="text-xs text-gray-500">'+p.match_count+' 场</div></div></div><div class="text-green-400 font-bold">'+p.avg_acs+'</div></div>';
            }).join("");
            document.getElementById("hot-players-list").innerHTML = html;
        } catch(e) { console.error(e); }
    }

    async function loadRegionChart() {
        try {
            var data = await (await fetch("/api/region_distribution")).json();
            new Chart(document.getElementById("regionChart"), {
                type: 'bar',
                data: {
                    labels: data.map(function(r){return r.region;}),
                    datasets: [{
                        label: '战队数',
                        data: data.map(function(r){return r.team_count;}),
                        backgroundColor: ['#ef4444','#3b82f6','#22c55e','#eab308','#a855f7','#ec4899']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                }
            });
        } catch(e) { console.error(e); }
    }

    async function loadTop10Chart() {
        try {
            var data = await (await fetch("/api/top10_players")).json();
            new Chart(document.getElementById("top10Chart"), {
                type: 'bar',
                data: {
                    labels: data.map(function(r){return r.player;}),
                    datasets: [{
                        label: '场均ACS',
                        data: data.map(function(r){return r.avg_acs;}),
                        backgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true } }
                }
            });
        } catch(e) { console.error(e); }
    }

    loadStats();
    loadHotPlayers();
    loadRegionChart();
    loadTop10Chart();
    </script>
</body>
</html>
