<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答 - VCT知识图谱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a0f; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        #chat-msg::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="text-white min-h-screen">
    <nav class="bg-gray-900/90 border-b border-gray-800 sticky top-0 z-50 backdrop-blur">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="text-xl font-bold"><span class="text-red-500">●</span> VCT 知识图谱</a>
                <div class="hidden md:flex space-x-1">
                    <a href="/" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-home mr-2"></i>首页</a>
                    <a href="/qa" class="px-4 py-2 rounded-lg text-sm bg-red-600 text-white"><i class="fas fa-robot mr-2"></i>智能问答</a>
                    <a href="/players" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-users mr-2"></i>选手数据</a>
                    <a href="/rankings" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-trophy mr-2"></i>排行榜</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-6 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold"><i class="fas fa-robot text-red-500 mr-3"></i>智能问答</h1>
                <p class="text-gray-400 mt-2">问问关于 VCT 战队和选手的问题</p>
            </div>
            <button onclick="showHistory()" class="px-4 py-2 rounded-lg text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition"><i class="fas fa-history mr-2"></i>历史</button>
        </div>

        <div class="bg-gray-900 rounded-2xl border border-gray-800 h-[600px] flex flex-col">
            <div id="chat-msg" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="flex items-start space-x-3">
                    <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center flex-shrink-0"><i class="fas fa-robot text-sm"></i></div>
                    <div class="bg-gray-800 rounded-2xl rounded-tl-none px-5 py-3 max-w-[80%]">
                        <p class="text-gray-300 text-sm leading-relaxed">
                            你好！我是 VCT 知识图谱助手，可以回答关于战队和选手的问题。<br><br>
                            试试问我：<br>
                            "DRX有哪些选手？"<br>
                            "MaKo是哪个战队的？"<br>
                            "Sacy的表现怎么样？"<br>
                            "FNC属于哪个赛区？"
                        </p>
                    </div>
                </div>
            </div>
            <div class="border-t border-gray-800 p-4">
                <div class="flex space-x-3">
                    <input id="chat-input" type="text" placeholder="输入你的问题..." class="flex-1 bg-gray-800 rounded-xl px-5 py-3 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-red-500 border border-gray-700">
                    <button id="chat-send" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-medium transition-all"><i class="fas fa-paper-plane mr-2"></i>发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-gray-900 rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto border border-gray-800">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold"><i class="fas fa-history text-red-500 mr-2"></i>历史记录</h2>
                <div class="flex space-x-2">
                    <button onclick="clearHistory()" class="px-3 py-1.5 rounded-lg text-xs bg-red-600 text-white hover:bg-red-700">清空</button>
                    <button onclick="closeHistory()" class="px-3 py-1.5 rounded-lg text-xs bg-gray-800 text-gray-300 hover:bg-gray-700">关闭</button>
                </div>
            </div>
            <div id="history-list" class="space-y-3"></div>
        </div>
    </div>

    <footer class="bg-gray-900 border-t border-gray-800 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
            VCT 知识图谱问答系统 &mdash; Powered by Neo4j + Flask
        </div>
    </footer>

    <script>
    var msgDiv = document.getElementById("chat-msg");
    var inp = document.getElementById("chat-input");
    var btn = document.getElementById("chat-send");
    var historyData = [];

    function addMsg(role, text) {
        var d = document.createElement("div");
        d.className = "flex items-start space-x-3 " + (role === "user" ? "flex-row-reverse space-x-reverse" : "");
        var avatar = document.createElement("div");
        avatar.className = "w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 " + (role === "user" ? "bg-blue-600" : "bg-red-600");
        avatar.innerHTML = role === "user" ? '<i class="fas fa-user text-sm"></i>' : '<i class="fas fa-robot text-sm"></i>';
        var bubble = document.createElement("div");
        bubble.className = "rounded-2xl px-5 py-3 max-w-[80%] text-sm " + (role === "user" ? "bg-blue-900 rounded-tr-none" : "bg-gray-800 rounded-tl-none");
        bubble.innerHTML = '<p class="text-gray-300 leading-relaxed">'+text.replace(/\n/g,"<br>")+'</p>';
        d.appendChild(avatar);
        d.appendChild(bubble);
        msgDiv.appendChild(d);
        msgDiv.scrollTop = msgDiv.scrollHeight;
    }

    async function sendMsg() {
        var q = inp.value.trim();
        if(!q) return;
        addMsg("user", q);
        inp.value = "";
        var loading = document.createElement("div");
        loading.className = "flex items-start space-x-3";
        loading.innerHTML = '<div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center flex-shrink-0"><i class="fas fa-robot text-sm"></i></div><div class="bg-gray-800 rounded-2xl rounded-tl-none px-5 py-3"><p class="text-gray-400 text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>思考中...</p></div>';
        msgDiv.appendChild(loading);
        msgDiv.scrollTop = msgDiv.scrollHeight;
        try {
            var r = await fetch("/ask", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({question:q}) });
            var d = await r.json();
            loading.remove();
            addMsg("ai", d.answer);
        } catch(e) {
            loading.remove();
            addMsg("ai", "抱歉，暂时无法回答，请稍后再试。");
        }
    }

    btn.addEventListener("click", sendMsg);
    inp.addEventListener("keypress", function(e){if(e.key==="Enter") sendMsg();});

    async function showHistory() {
        var r = await fetch("/history");
        historyData = await r.json();
        var list = document.getElementById("history-list");
        if(historyData.length===0) {
            list.innerHTML = '<p class="text-gray-500 text-center py-8">暂无历史记录</p>';
        } else {
            list.innerHTML = historyData.map(function(h){
                return '<div class="bg-gray-800 rounded-xl p-4"><div class="text-sm text-blue-400 mb-1">Q: '+h.question+'</div><div class="text-sm text-gray-300">A: '+h.answer+'</div></div>';
            }).join("");
        }
        document.getElementById("history-modal").classList.remove("hidden");
        document.getElementById("history-modal").classList.add("flex");
    }

    function closeHistory() {
        document.getElementById("history-modal").classList.add("hidden");
        document.getElementById("history-modal").classList.remove("flex");
    }

    async function clearHistory() {
        await fetch("/clear_history", {method:"POST"});
        historyData = [];
        document.getElementById("history-list").innerHTML = '<p class="text-gray-500 text-center py-8">暂无历史记录</p>';
    }
    </script>
</body>
</html>
