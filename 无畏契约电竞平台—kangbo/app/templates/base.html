<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}无畏契约电竞平台{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold text-red-500">无畏契约电竞</a>
                    <div class="hidden md:flex space-x-6">
                        <a href="/teams" class="text-gray-300 hover:text-white transition px-3 py-2 text-sm font-medium rounded-md hover:bg-gray-800">战队</a>
                        <a href="/players" class="text-gray-300 hover:text-white transition px-3 py-2 text-sm font-medium rounded-md hover:bg-gray-800">选手</a>
                        <a href="/chat" class="text-gray-300 hover:text-white transition px-3 py-2 text-sm font-medium rounded-md hover:bg-gray-800">AI助手</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    <footer class="bg-gray-900 border-t border-gray-800 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">
            <p>无畏契约电竞平台 — MVP v1.0</p>
        </div>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
