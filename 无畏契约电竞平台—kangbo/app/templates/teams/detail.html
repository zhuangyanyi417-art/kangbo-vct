<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战队详情 - 无畏契约电竞平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4"><div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-8">
            <a href="/" class="text-xl font-bold"><span class="text-red-500">●</span> 无畏契约电竞</a>
            <div class="hidden md:flex space-x-1">
                <a href="/teams" class="px-4 py-2 rounded-lg text-sm bg-red-600 text-white"><i class="fas fa-shield-halved mr-2"></i>战队</a>
                <a href="/players" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-users mr-2"></i>选手</a>
                <a href="/chat" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-robot mr-2"></i>AI助手</a>
            </div>
        </div>
    </div></div>
</nav>
<div class="max-w-7xl mx-auto px-4 py-8"><div id="team-detail"></div></div>
<footer class="bg-gray-900 border-t border-gray-800 mt-12"><div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">无畏契约电竞平台 &mdash; MVP v1.0</div></footer>
<script>
var tid = parseInt(window.location.pathname.split("/").pop());
async function loadTeam() {
    try {
        var t = await (await fetch("/api/teams/"+tid)).json();
        var p = await (await fetch("/api/teams/"+tid+"/players")).json();
        var s = await (await fetch("/api/teams/"+tid+"/stats")).json();
        var html = '<div class="bg-gray-900 rounded-2xl p-8 mb-8 border border-gray-800"><div class="flex flex-col md:flex-row items-center md:items-start space-y-4 md:space-y-0 md:space-x-8"><div class="w-28 h-28 bg-gradient-to-br from-red-600 to-red-800 rounded-3xl flex items-center justify-center text-5xl font-bold shadow-lg flex-shrink-0">'+t.name[0]+'</div><div class="text-center md:text-left"><h1 class="text-4xl font-bold">'+t.name+'</h1><p class="text-gray-400 mt-2">'+t.region+'</p><p class="text-gray-400 mt-2">'+(t.description||"")+'</p></div></div><div class="grid grid-cols-3 gap-4 mt-8"><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-3xl font-bold text-green-400">'+s.win_rate+'%</div><div class="text-xs text-gray-500 mt-1">胜率</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-3xl font-bold text-white">'+s.wins+'</div><div class="text-xs text-gray-500 mt-1">胜场</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-3xl font-bold text-red-400">'+s.losses+'</div><div class="text-xs text-gray-500 mt-1">负场</div></div></div></div>';
        html += '<h2 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-users text-red-500 mr-3"></i>选手名单</h2><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">';
        html += (p.players||[]).map(function(pl){
            return '<a href="/players/'+pl.id+'" class="bg-gray-900 rounded-xl p-5 hover:bg-gray-800 transition-all border border-gray-800 card-hover flex items-center space-x-4"><div class="w-12 h-12 bg-gradient-to-br from-blue-600 to-blue-800 rounded-xl flex items-center justify-center text-lg font-bold shadow flex-shrink-0">'+pl.name[0]+'</div><div class="flex-1 min-w-0"><div class="font-semibold truncate">'+pl.name+'</div><div class="text-xs text-gray-400">'+pl.role+' · '+pl.country+'</div></div><div class="text-right"><div class="text-green-400 text-sm font-semibold">'+pl.kda+' KDA</div><div class="text-xs text-gray-500">'+pl.win_rate+'%</div></div></a>';
        }).join("");
        html += '</div>';
        document.getElementById("team-detail").innerHTML = html;
    } catch(e) { document.getElementById("team-detail").innerHTML = '<div class="text-center py-20"><i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i><p class="text-gray-400">加载失败</p></div>'; }
}
loadTeam();
</script></body></html>
