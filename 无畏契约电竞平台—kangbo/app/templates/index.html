<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无畏契约电竞平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold"><span class="text-red-500">●</span> 无畏契约电竞</a>
                    <div class="hidden md:flex space-x-1">
                        <a href="/teams" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800 transition-all"><i class="fas fa-shield-halved mr-2"></i>战队</a>
                        <a href="/players" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800 transition-all"><i class="fas fa-users mr-2"></i>选手</a>
                        <a href="/chat" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800 transition-all"><i class="fas fa-robot mr-2"></i>AI助手</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="space-y-8">
            <div class="text-center py-12">
                <h1 class="text-5xl font-bold mb-4">无畏契约 <span class="text-red-500">电竞平台</span></h1>
                <p class="text-gray-400 text-lg">追踪战队与选手数据，尽览赛场风云</p>
            </div>
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold flex items-center"><i class="fas fa-shield-halved text-red-500 mr-3"></i>热门战队</h2>
                    <a href="/teams" class="text-red-400 hover:text-red-300 text-sm flex items-center">查看全部 <i class="fas fa-arrow-right ml-2"></i></a>
                </div>
                <div id="home-teams" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            </section>
            <section>
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold flex items-center"><i class="fas fa-users text-red-500 mr-3"></i>顶尖选手</h2>
                    <a href="/players" class="text-red-400 hover:text-red-300 text-sm flex items-center">查看全部 <i class="fas fa-arrow-right ml-2"></i></a>
                </div>
                <div id="home-players" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
            </section>
        </div>
    </main>
    <footer class="bg-gray-900 border-t border-gray-800 mt-12">
        <div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">无畏契约电竞平台 &mdash; MVP v1.0</div>
    </footer>
    <script>
    async function loadHome() {
        try {
            var tr = await (await fetch("/api/teams")).json();
            var pr = await (await fetch("/api/players")).json();
            var tc = document.getElementById("home-teams");
            tc.innerHTML = tr.teams.slice(0,8).map(function(t){
                return '<a href="/teams/'+t.id+'" class="block bg-gray-900 rounded-xl p-5 hover:bg-gray-800 transition-all border border-gray-800 card-hover fade-in"><div class="flex items-center space-x-4"><div class="w-14 h-14 bg-gradient-to-br from-red-600 to-red-800 rounded-2xl flex items-center justify-center text-xl font-bold shadow-lg">'+t.name[0]+'</div><div class="flex-1 min-w-0"><div class="font-semibold text-lg truncate">'+t.name+'</div><div class="text-xs text-gray-400 mt-0.5">'+t.region+'</div></div><div class="text-right"><div class="text-green-400 font-bold text-lg">'+t.win_rate+'%</div><div class="text-xs text-gray-500">胜率</div></div></div></a>';
            }).join("");
            var pc = document.getElementById("home-players");
            pc.innerHTML = pr.players.slice(0,8).map(function(p){
                return '<a href="/players/'+p.id+'" class="block bg-gray-900 rounded-xl p-5 hover:bg-gray-800 transition-all border border-gray-800 card-hover fade-in"><div class="flex items-center space-x-4"><div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center text-xl font-bold shadow-lg">'+p.name[0]+'</div><div class="flex-1 min-w-0"><div class="font-semibold truncate">'+p.name+'</div><div class="text-xs text-gray-400 mt-0.5">'+p.role+' · '+(p.team_name||"自由人")+'</div></div><div class="text-right"><div class="text-blue-400 font-bold">'+p.kda+' KDA</div><div class="text-xs text-gray-500">'+p.win_rate+'%</div></div></div></a>';
            }).join("");
        } catch(e) { console.error(e); }
    }
    loadHome();
    </script>
</body>
</html>
