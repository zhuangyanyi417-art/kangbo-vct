<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选手详情 - 无畏契约电竞平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4"><div class="flex items-center justify-between h-16">
        <div class="flex items-center space-x-8">
            <a href="/" class="text-xl font-bold"><span class="text-red-500">●</span> 无畏契约电竞</a>
            <div class="hidden md:flex space-x-1">
                <a href="/teams" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-shield-halved mr-2"></i>战队</a>
                <a href="/players" class="px-4 py-2 rounded-lg text-sm bg-red-600 text-white"><i class="fas fa-users mr-2"></i>选手</a>
                <a href="/chat" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-robot mr-2"></i>AI助手</a>
            </div>
        </div>
    </div></div>
</nav>
<div class="max-w-7xl mx-auto px-4 py-8"><div id="player-detail"></div></div>
<footer class="bg-gray-900 border-t border-gray-800 mt-12"><div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">无畏契约电竞平台 &mdash; MVP v1.0</div></footer>
<script>
var pid = parseInt(window.location.pathname.split("/").pop());
async function loadPlayer() {
    try {
        var p = await (await fetch("/api/players/"+pid)).json();
        var s = await (await fetch("/api/players/"+pid+"/stats")).json();
        var html = '<div class="bg-gray-900 rounded-2xl p-8 border border-gray-800"><div class="flex flex-col md:flex-row items-center md:items-start space-y-4 md:space-y-0 md:space-x-8"><div class="w-28 h-28 bg-gradient-to-br from-blue-600 to-blue-800 rounded-3xl flex items-center justify-center text-5xl font-bold shadow-lg flex-shrink-0">'+p.name[0]+'</div><div class="text-center md:text-left"><h1 class="text-4xl font-bold">'+p.name+'</h1><p class="text-gray-400 mt-1">'+(p.real_name||"")+'</p><div class="flex flex-wrap gap-2 mt-4 justify-center md:justify-start"><span class="px-3 py-1 rounded-full text-xs bg-gray-800 text-gray-300"><i class="fas fa-globe mr-1"></i>'+p.country+'</span><span class="px-3 py-1 rounded-full text-xs bg-gray-800 text-gray-300">'+p.role+'</span><span class="px-3 py-1 rounded-full text-xs bg-gray-800 text-gray-300">'+(p.team_name||"自由人")+'</span></div></div></div><div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8"><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-3xl font-bold text-green-400">'+s.kda+'</div><div class="text-xs text-gray-500 mt-1">KDA</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-white">'+s.kills+'/'+s.deaths+'/'+s.assists+'</div><div class="text-xs text-gray-500 mt-1">K/D/A</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-3xl font-bold text-yellow-400">'+s.hs_percent+'%</div><div class="text-xs text-gray-500 mt-1">爆头率</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-3xl font-bold text-blue-400">'+s.win_rate+'%</div><div class="text-xs text-gray-500 mt-1">胜率</div></div></div><div class="grid grid-cols-3 gap-4 mt-4"><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-2xl font-bold">'+s.matches_played+'</div><div class="text-xs text-gray-500 mt-1">出场</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-green-400">'+s.wins+'</div><div class="text-xs text-gray-500 mt-1">胜场</div></div><div class="bg-gray-800 rounded-xl p-4 text-center"><div class="text-2xl font-bold text-red-400">'+(s.matches_played-s.wins)+'</div><div class="text-xs text-gray-500 mt-1">负场</div></div></div></div>';
        document.getElementById("player-detail").innerHTML = html;
    } catch(e) { document.getElementById("player-detail").innerHTML = '<div class="text-center py-20"><i class="fas fa-exclamation-triangle text-red-500 text-4xl mb-4"></i><p class="text-gray-400">加载失败</p></div>'; }
}
loadPlayer();
</script></body></html>
