<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选手列表 - 无畏契约电竞平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#111827}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}</style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
<nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center space-x-8">
                <a href="/" class="text-xl font-bold"><span class="text-red-500">●</span> 无畏契约电竞</a>
                <div class="hidden md:flex space-x-1">
                    <a href="/teams" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-shield-halved mr-2"></i>战队</a>
                    <a href="/players" class="px-4 py-2 rounded-lg text-sm bg-red-600 text-white"><i class="fas fa-users mr-2"></i>选手</a>
                    <a href="/chat" class="px-4 py-2 rounded-lg text-sm text-gray-300 hover:text-white hover:bg-gray-800"><i class="fas fa-robot mr-2"></i>AI助手</a>
                </div>
            </div>
        </div>
    </div>
</nav>
<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-8">
        <h1 class="text-3xl font-bold mb-6 flex items-center"><i class="fas fa-users text-red-500 mr-3"></i>选手列表</h1>
        <div class="flex flex-wrap gap-2" id="player-filters">
            <button data-role="" class="px-4 py-2 rounded-full text-sm bg-red-600 text-white hover:bg-red-700 transition">全部</button>
            <button data-role="Duelist" class="px-4 py-2 rounded-full text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition">决斗者</button>
            <button data-role="Initiator" class="px-4 py-2 rounded-full text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition">先锋</button>
            <button data-role="Controller" class="px-4 py-2 rounded-full text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition">控场者</button>
            <button data-role="Sentinel" class="px-4 py-2 rounded-full text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition">哨卫</button>
            <button data-role="Flex" class="px-4 py-2 rounded-full text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition">自由人</button>
        </div>
    </div>
    <div id="players-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
</div>
<footer class="bg-gray-900 border-t border-gray-800 mt-12"><div class="max-w-7xl mx-auto px-4 py-8 text-center text-gray-500 text-sm">无畏契约电竞平台 &mdash; MVP v1.0</div></footer>
<script>
function loadPlayers(role) {
    fetch(role?"/api/players?role="+role:"/api/players").then(function(r){return r.json();}).then(function(data){
        var g = document.getElementById("players-grid");
        g.innerHTML = data.players.map(function(p){
            return '<a href="/players/'+p.id+'" class="block bg-gray-900 rounded-xl p-5 hover:bg-gray-800 transition-all border border-gray-800 card-hover"><div class="flex items-center space-x-4 mb-4"><div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center text-xl font-bold shadow-lg">'+p.name[0]+'</div><div class="flex-1 min-w-0"><div class="font-semibold text-lg truncate">'+p.name+'</div><div class="text-xs text-gray-400 mt-0.5">'+(p.real_name||"")+'</div></div></div><div class="flex justify-between text-sm pt-3 border-t border-gray-800"><span class="inline-block px-2 py-0.5 rounded text-xs bg-gray-800 text-gray-300">'+p.role+'</span><span class="text-gray-400">'+(p.team_name||"自由人")+'</span><span class="text-green-400 font-semibold">'+p.win_rate+'%</span></div></a>';
        }).join("");
    });
}
document.getElementById("player-filters").addEventListener("click", function(e){
    var btn = e.target.closest("button");
    if(!btn) return;
    document.querySelectorAll("#player-filters button").forEach(function(b){b.className="px-4 py-2 rounded-full text-sm bg-gray-800 text-gray-300 hover:bg-gray-700 transition";});
    btn.className = "px-4 py-2 rounded-full text-sm bg-red-600 text-white hover:bg-red-700 transition";
    loadPlayers(btn.dataset.role);
});
loadPlayers("");
</script>
</body></html>
